name: Keep Render Backend Awake

on:
  schedule:
    # Run every 5 minutes because GitHub Actions cron jobs are often delayed by 5-10 minutes!
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        # Replace the URL below with your actual Render URL!
        run: |
          curl -sS https://rag-backend-avxg.onrender.com/api/health
          echo "Ping successful!"
