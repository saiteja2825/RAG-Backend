name: Keep Render Backend Awake

on:
  schedule:
    # Run every 14 minutes to prevent Render's 15-minute free tier spin-down
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        # Replace the URL below with your actual Render URL!
        run: |
          curl -sS https://rag-backend-avxg.onrender.com
          echo "Ping successful!"
